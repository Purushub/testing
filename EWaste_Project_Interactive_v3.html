
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Waste Management Project - Grade 7</title>
    <style>
        :root { --danger: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--danger); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 20px 0; border-radius: 10px; border: 2px solid var(--danger); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .section { margin-bottom: 30px; border: 1px solid #eee; padding: 20px; border-radius: 10px; }
        h1, h2 { color: var(--danger); }
        textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .print-btn { background: var(--danger); color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>♻️ E-Waste Management Worksheet</h1>
        <p><strong>Part 1: The Global Problem</strong></p>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/MQLadfsvfLo" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="section">
            <h2>Video Insights</h2>
            <p>What happens to the electronics that are not recycled properly according to the video?</p>
            <textarea rows="3"></textarea>
        </div>

        <div class="section">
            <h2>Home Audit Table</h2>
            <p>Identify items that need safe disposal.</p>
            <textarea rows="4" placeholder="Item 1: 
Item 2: 
Item 3:"></textarea>
        </div>

        <div style="text-align: center;">
            <button class="print-btn" onclick="window.print()">Save Progress (PDF)</button>
        </div>
    </div>
</body>
</html>
