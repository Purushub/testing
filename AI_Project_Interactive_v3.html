
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Summer Project - Grade 7</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #6c5ce7; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 20px 0; border-radius: 10px; border: 2px solid var(--primary); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .section { margin-bottom: 30px; border: 1px solid #eee; padding: 20px; border-radius: 10px; }
        h1, h2 { color: var(--primary); }
        textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .download-btn { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; }
        .print-btn { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Assistant Explorer Worksheet</h1>
        <p><strong>Part 1: Watch & Learn</strong></p>
        <div class="video-container">
<iframe width="810" height="455" src="https://www.youtube.com/embed/kwcillcWOg0" title="Teachable Machine 1: Image Classification" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>        </div>

        <div class="section">
            <h2>Video Reflection</h2>
            <p>Based on the video, how does an AI assistant learn from us?</p>
            <textarea rows="3"></textarea>
        </div>

        <div class="section">
            <h2>Activity: Teachable Machine</h2>
            <p>Visit <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a> and train your first model.</p>
            <textarea rows="3" placeholder="Describe what classes you created..."></textarea>
        </div>

        <div style="text-align: center; gap: 20px; display: flex; justify-content: center;">
            <button class="print-btn" onclick="window.print()">Save Progress (PDF)</button>
        </div>
    </div>
</body>
</html>
